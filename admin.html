<!DOCTYPE html>

<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>پنل مدیریت پذیرنده ها</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>

body{
background:#f3f4f6;
}

.card{
background:#fff;
border-radius:20px;
padding:16px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:12px;
}

</style>

</head>

<body>

<div id="loginPage" class="max-w-md mx-auto mt-20">

<div class="card">

<h2 class="text-2xl font-bold text-center mb-4">
ورود ادمین
</h2>

<input
id="email"
class="input mb-3"
value="wolfaraki@gmail.com"
placeholder="ایمیل">

<input
id="password"
type="password"
class="input mb-3"
placeholder="رمز عبور">

<button
onclick="login()"
class="w-full bg-blue-600 text-white p-3 rounded-xl">

ورود

</button>

<p id="loginMsg" class="text-center mt-3 text-red-600"></p>

</div>

</div>

<div id="adminPanel" style="display:none">

<div class="max-w-7xl mx-auto p-4">

<div class="flex flex-wrap gap-3 justify-between items-center mb-5">

<h1 class="text-3xl font-bold">
پنل مدیریت پذیرنده ها
</h1>

<div class="flex gap-2">

<button
onclick="loadData()"
class="bg-blue-600 text-white px-4 py-2 rounded-xl">

بروزرسانی

</button>

<button
onclick="exportExcel()"
class="bg-green-600 text-white px-4 py-2 rounded-xl">

خروجی اکسل

</button>

<button
onclick="logout()"
class="bg-red-600 text-white px-4 py-2 rounded-xl">

خروج

</button>

</div>

</div>

<div class="grid md:grid-cols-3 gap-4 mb-5">

<div class="card text-center">
<div class="text-gray-500">کل ثبت نام ها</div>
<div id="totalCount" class="text-3xl font-bold">0</div>
</div>

<div class="card text-center">
<div class="text-gray-500">تایید شده</div>
<div id="approvedCount" class="text-3xl font-bold text-green-600">0</div>
</div>

<div class="card text-center">
<div class="text-gray-500">رد شده</div>
<div id="rejectedCount" class="text-3xl font-bold text-red-600">0</div>
</div>

</div>

<div class="card mb-4">

<div class="grid md:grid-cols-2 gap-3">

<input
id="searchBox"
class="input"
placeholder="جستجو نام، موبایل یا کد ملی"
onkeyup="renderCards()">

<select
id="statusFilter"
class="input"
onchange="renderCards()">

<option value="">همه وضعیت ها</option>
<option value="جدید">جدید</option>
<option value="تایید شده">تایید شده</option>
<option value="رد شده">رد شده</option>

</select>

</div>

</div>

<div id="list" class="space-y-4"></div>

</div>

</div>

<script>

const ADMIN_EMAIL =
"wolfaraki@gmail.com";

const SUPABASE_URL =
"https://ostreoiqftpcittfdzbi.supabase.co";

const SUPABASE_KEY =
"sb_publishable_0tfxdJw3yNU_oJ3H7ooGdA_ZTwJ-556";

const { createClient } = supabase;

const db =
createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let allData = [];

checkSession();

async function checkSession(){

const {
data:{session}
} = await db.auth.getSession();

if(
session &&
session.user.email === ADMIN_EMAIL
){

document
.getElementById("loginPage")
.style.display="none";

document
.getElementById("adminPanel")
.style.display="block";

loadData();

}

}

async function login(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const { error } =
await db.auth.signInWithPassword({

email,
password

});

if(error){

document
.getElementById("loginMsg")
.innerHTML=error.message;

return;

}

location.reload();

}

async function logout(){

await db.auth.signOut();

location.reload();

}

async function loadData(){

const container =
document.getElementById("list");

container.innerHTML =
"در حال دریافت اطلاعات ...";

const { data,error } =
await db
.from("national_cards")
.select("*")
.order("id",{ascending:false});

if(error){

container.innerHTML =
"خطا در دریافت اطلاعات";

return;

}

allData = data;

updateStats();

renderCards();

}
function updateStats(){

document.getElementById("totalCount").innerHTML =
allData.length;

document.getElementById("approvedCount").innerHTML =
allData.filter(
x=>x.status==="تایید شده"
).length;

document.getElementById("rejectedCount").innerHTML =
allData.filter(
x=>x.status==="رد شده"
).length;

}

function renderCards(){

const container =
document.getElementById("list");

const search =
document
.getElementById("searchBox")
.value
.toLowerCase();

const status =
document
.getElementById("statusFilter")
.value;

let data =
allData.filter(item=>{

const txt =
`${item.full_name||""}
${item.mobile_number||""}
${item.national_code||""}`
.toLowerCase();

const matchSearch =
txt.includes(search);

const matchStatus =
!status ||
item.status===status;

return(
matchSearch &&
matchStatus
);

});

container.innerHTML="";

if(data.length===0){

container.innerHTML=`

<div class="card text-center">
موردی یافت نشد
</div>
`;

return;

}

data.forEach(item=>{

container.innerHTML += `

<div class="card">

<div class="flex justify-between items-center mb-3">

<div>

<h3 class="text-xl font-bold">

${item.full_name || "-"}

</h3>

<div class="text-gray-500">

${item.mobile_number || "-"}

</div>

</div>

<div>

<span class="bg-gray-200 px-3 py-1 rounded-full">

${item.status || "جدید"}

</span>

</div>

</div>

<div class="grid md:grid-cols-2 gap-2 text-sm">

<div>
<b>کد ملی:</b>
${item.national_code || "-"}
</div>

<div>
<b>فروشگاه:</b>
${item.shop_name || "-"}
</div>

<div>
<b>صنف:</b>
${item.business_type || "-"}
</div>

<div>
<b>نوع دستگاه:</b>
${item.device_type || "-"}
</div>

<div>
<b>کد پستی:</b>
${item.postal_code || "-"}
</div>

<div>
<b>تلفن:</b>
${item.phone_number || "-"}
</div>

</div>

<div class="mt-3">

<b>آدرس:</b>

${item.shop_address || "-"}

</div>

<div class="mt-3 flex flex-wrap gap-2">

<button
onclick="updateStatus(${item.id},'تایید شده')"
class="bg-green-600 text-white px-3 py-2 rounded-xl">

تایید

</button>

<button
onclick="updateStatus(${item.id},'رد شده')"
class="bg-red-600 text-white px-3 py-2 rounded-xl">

رد

</button>

${item.national_card_image ?

`<a
href="${item.national_card_image}"
target="_blank"
class="bg-blue-600 text-white px-3 py-2 rounded-xl">

مشاهده کارت ملی

</a>`

:

''

}

</div>

</div>

`;

});

}

async function updateStatus(
id,
status
){

const { error } =
await db
.from("national_cards")
.update({status})
.eq("id",id);

if(error){

alert(
"خطا در بروزرسانی"
);

return;

}

loadData();

}

function exportExcel(){

const rows =
allData.map(item=>({

"نام":
item.full_name,

"موبایل":
item.mobile_number,

"کد ملی":
item.national_code,

"فروشگاه":
item.shop_name,

"وضعیت":
item.status,

"تاریخ ثبت":
item.created_at

}));

const worksheet =
XLSX.utils.json_to_sheet(rows);

const workbook =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
workbook,
worksheet,
"Merchants"
);

XLSX.writeFile(
workbook,
"merchants.xlsx"
);

}

</script>

</body>
</html>
